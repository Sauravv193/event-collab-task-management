# Database Configuration
# Constructs the final JDBC URL from individual components provided by Render's environment.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${jwt.secret}
jwt.expiration.ms=${jwt.expiration.ms}

# Server Configuration
server.port=8080

# Logging
logging.level.aura.event_based_task=DEBUG
logging.level.org.springframework.security=DEBUG
