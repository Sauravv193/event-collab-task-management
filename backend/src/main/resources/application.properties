# Database Configuration
spring.datasource.url=jdbc:${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# These values are placeholders. They will be overridden by environment variables on Render.
jwt.secret=placeholder-secret-for-startup
jwt.expiration.ms=86400000

# Server Configuration
server.port=8080

# Logging
logging.level.aura.event_based_task=DEBUG
logging.level.org.springframework.security=DEBUG
