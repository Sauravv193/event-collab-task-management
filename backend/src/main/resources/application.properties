# Database Configuration
# This prepends "jdbc:" to the URL provided by Render's environment variable.
spring.datasource.url=jdbc:${JDBC_DATABASE_URL}

# Explicitly tell Spring Boot which driver to use
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Logging
logging.level.aura.event_based_task=DEBUG
logging.level.org.springframework.security=DEBUG
