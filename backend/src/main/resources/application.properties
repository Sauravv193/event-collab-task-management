# Database Configuration for Production and Local
# This will use the environment variable provided by Render in production.
spring.datasource.url=${JDBC_DATABASE_URL}

# Explicitly tell Spring Boot which driver to use
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# These will be overridden by environment variables in production for security.
jwt.secret=yourSuperSecretKeyChangeThisInProductionWithAtLeast64CharactersLong
jwt.expiration.ms=86400000

# Server Configuration
server.port=8080

# Logging
logging.level.aura.event_based_task=DEBUG
logging.level.org.springframework.security=DEBUG
